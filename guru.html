<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Laporan Guru</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
}

h2{
    text-align:center;
    margin-bottom:5px;
}

.info{
    margin:15px 0;
    line-height:1.6;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    border:1px solid #000;
    padding:4px 6px;
    font-size:11px;
    vertical-align:top;
}

th{
    background:#d9d9d9;
}

.hari-row td{
    background:#e6e6e6;
    font-weight:bold;
    text-align:left;
}

.col-materi,
.col-sakit,
.col-izin,
.col-alfa{
    white-space:normal;
    word-break:break-word;
}

.col-materi{
    min-width:220px;
}

.ttd{
    margin-top:20px;
}

.ttd td{
    border:none;
}

@media print{

    @page{
        size:A4 portrait;
        margin:10mm;
    }

}

    
</style>

</head>

<body>

<div id="output">
Loading...
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyxRyz4qHsFOpMxWHf9K1cP_ESxvO20RlCJiB2onRRl10WgmZRzl-etZrpfH6twilPH/exec";

const NAMA_HARI = [
    "Minggu",
    "Senin",
    "Selasa",
    "Rabu",
    "Kamis",
    "Jumat",
    "Sabtu"
];

// =========================
// PARAMETER URL
// =========================

function getParam(nama){

    return new URLSearchParams(
        location.search
    ).get(nama);

}

// =========================
// PARSE TANGGAL
// =========================

function parseTanggal(str){

    if(!str) return null;

    const p =
    String(str).split("-");

    if(p[0].length === 4){

        return new Date(
            Number(p[0]),
            Number(p[1]) - 1,
            Number(p[2])
        );

    }

    return new Date(
        Number(p[2]),
        Number(p[1]) - 1,
        Number(p[0])
    );

}

// =========================
// FORMAT TANGGAL
// =========================

function formatTanggal(tanggal){

    const d =
    tanggal instanceof Date
    ? tanggal
    : parseTanggal(tanggal);

    const dd =
    String(d.getDate())
    .padStart(2,"0");

    const mm =
    String(d.getMonth()+1)
    .padStart(2,"0");

    const yyyy =
    d.getFullYear();

    return dd + "-" + mm + "-" + yyyy;

}

// =========================
// NAMA HARI
// =========================

function namaHari(tanggal){

    const d =
    parseTanggal(tanggal);

    return NAMA_HARI[
        d.getDay()
    ];

}

// =========================
// PERIODE MINGGUAN
// =========================

function getPeriodeMinggu(tanggal){

    let d =
    new Date(tanggal);

    let hari =
    d.getDay();

    if(hari === 0){

        hari = 7;

    }

    let senin =
    new Date(d);

    senin.setDate(
        d.getDate() - hari + 1
    );

    senin.setHours(
        0,0,0,0
    );

    let sabtu =
    new Date(senin);

    sabtu.setDate(
        senin.getDate() + 5
    );

    sabtu.setHours(
        23,59,59,999
    );

    return {

        senin,
        sabtu

    };

}

// =========================
// LOAD DATA
// =========================

async function loadData(){

    const guru =
    getParam("guru");

    const tanggal =
    getParam("tanggal");

    if(!guru || !tanggal){

        document
        .getElementById("output")
        .innerHTML =
        "<h2>Parameter tidak lengkap</h2>";

        return;

    }

    const periode =
    getPeriodeMinggu(
        tanggal
    );

    const kelasList = [

        "7A","7B","7C",
        "7D","7E","7F",
        "7G","7H","7I"

    ];

    let semua = [];

    try{

        const requests =
        kelasList.map(
            kelas =>
            fetch(
                API +
                "?rekap=" +
                kelas
            )
            .then(r=>r.json())
            .catch(()=>[])
        );

        const hasil =
        await Promise.all(
            requests
        );

        hasil.forEach(data=>{

            if(
                Array.isArray(data) &&
                data.length > 1
            ){

                data.shift();

                semua =
                semua.concat(
                    data
                );

            }

        });

    }catch(err){

        console.error(err);

    }

    semua = semua.filter(r=>{

        const t =
        parseTanggal(
            r[1]
        );

        return (

            t &&

            String(r[5] || "")
            .trim()
            .toLowerCase()

            ===

            String(guru)
            .trim()
            .toLowerCase()

            &&

            t >= periode.senin &&
            t <= periode.sabtu

        );

    });

    semua.sort((a,b)=>{

        const t1 =
        parseTanggal(a[1]);

        const t2 =
        parseTanggal(b[1]);

        if(
            t1.getTime() !==
            t2.getTime()
        ){

            return t1 - t2;

        }

        const jam1 =
        Number(
            String(a[2])
            .split("-")[0]
        );

        const jam2 =
        Number(
            String(b[2])
            .split("-")[0]
        );

        return jam1 - jam2;

    });

    renderGuru(

        semua,
        guru,
        periode.senin,
        periode.sabtu

    );

}

// =========================
// TAMPILKAN DATA
// =========================

function renderGuru(
    data,
    guru,
    awal,
    akhir
){

    if(data.length === 0){

        document
        .getElementById(
            "output"
        ).innerHTML =
        `
        <h2>
            Tidak ada data
        </h2>
        `;

        return;

    }

    let html = `

    <h2>
    LAPORAN JURNAL MENGAJAR GURU
    </h2>

    <div class="info">

    <b>Guru :</b>
    ${guru}

    <br>

    <b>Periode :</b>

    ${formatTanggal(awal)}
    s.d.
    ${formatTanggal(akhir)}

    </div>

    <table>

    <tr>

    <th>No</th>
    <th>Tanggal</th>
    <th>Kelas</th>
    <th>Jam</th>
    <th>Mapel</th>
    <th>Materi</th>
    <th>Sakit</th>
    <th>Izin</th>
    <th>Alfa</th>

    </tr>

    `;

    let hariLama = "";
    let no = 0;

    data.forEach(r=>{

        let hari =
        namaHari(r[1]);

        if(hari !== hariLama){

            no = 0;

            html += `
            <tr class="hari-row">
                <td colspan="9">
                    ${hari.toUpperCase()}
                </td>
            </tr>
            `;

        }

        html += `
        <tr>

            <td>${++no}</td>

            <td>${r[1]}</td>

            <td>${r[3]}</td>

            <td>${r[2]}</td>

            <td>${r[4]}</td>

            <td class="col-materi">
                ${r[6] || ""}
            </td>

            <td class="col-sakit">
                ${r[7] || ""}
            </td>

            <td class="col-izin">
                ${r[8] || ""}
            </td>

            <td class="col-alfa">
                ${r[9] || ""}
            </td>

        </tr>
        `;

        hariLama = hari;

    });

    html += `

    </table>

    <table class="ttd">

        <tr>

            <td style="width:60%"></td>

            <td align="center">

                Gentuma Raya,

                ${formatTanggal(
                    new Date()
                )}

            </td>

        </tr>

        <tr>

            <td></td>

            <td align="center">

                Guru Mata Pelajaran

            </td>

        </tr>

        <tr>

            <td style="height:80px"></td>

            <td></td>

        </tr>

        <tr>

            <td></td>

            <td align="center">

                ${guru}

            </td>

        </tr>

    </table>

    `;

    document
    .getElementById(
        "output"
    ).innerHTML =
    html;

}

loadData();


</script>

</body>
</html>
